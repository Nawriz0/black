<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blackjack — комната</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page page--room">
    <div class="bg-pattern" aria-hidden="true"></div>
    <main class="shell shell--wide">
      <header class="room-head">
        <div>
          <p class="eyebrow">Комната</p>
          <h1 class="room-head__title">
            Код: <span id="displayRoomCode" class="mono">------</span>
          </h1>
          <p class="muted">
            Игрок: <strong id="displayPlayerName">—</strong>
            <span id="hostBadge" class="badge" hidden>Хост</span>
          </p>
        </div>
        <div class="room-head__actions">
          <button id="btnCopyCode" class="btn btn--ghost" type="button">
            Копировать код
          </button>
          <button id="btnLeave" class="btn btn--danger" type="button">
            Покинуть комнату
          </button>
        </div>
      </header>

      <p id="roomError" class="msg msg--error" role="status" hidden></p>

      <section class="status-bar">
        <div class="pill" id="gameStatus">Ожидание игроков</div>
        <div class="pill pill--muted" id="turnHint" hidden></div>
      </section>

      <section id="bettingPanel" class="betting-panel" hidden>
        <h2 class="betting-panel__title">Ставки</h2>
        <p class="betting-panel__hint muted" id="bettingHint">
          Выберите сумму или введите свою, затем нажмите «Поставить». Ставка 0 — пропуск раунда.
        </p>
        <div class="betting-panel__row">
          <span class="betting-panel__balance"
            >Баланс: <strong id="myChipsDisplay">1000</strong></span
          >
        </div>
        <div class="betting-panel__chips">
          <button type="button" class="btn btn--ghost btn--chip" data-bet="50">50</button>
          <button type="button" class="btn btn--ghost btn--chip" data-bet="100">100</button>
          <button type="button" class="btn btn--ghost btn--chip" data-bet="200">200</button>
        </div>
        <div class="betting-panel__row betting-panel__row--grow">
          <input
            id="betInput"
            class="input input--mono"
            type="number"
            min="0"
            step="1"
            inputmode="numeric"
            placeholder="Сумма"
          />
          <button id="btnPlaceBet" class="btn btn--primary" type="button">Поставить</button>
        </div>
        <p id="betStatus" class="betting-panel__status muted" hidden></p>
      </section>

      <section class="felt">
        <div class="dealer-block">
          <div class="block-title">
            <span>Дилер</span>
            <span class="score" id="dealerScore"></span>
          </div>
          <div id="dealerCards" class="cards-row"></div>
        </div>

        <div class="players-grid" id="playersGrid"></div>
      </section>

      <section class="controls">
        <div class="controls__host" id="hostControls" hidden>
          <button id="btnStartBetting" class="btn btn--primary" type="button" hidden>
            Начать приём ставок
          </button>
          <button id="btnStartGame" class="btn btn--primary" type="button" hidden>
            Начать игру
          </button>
          <button id="btnNewRound" class="btn btn--secondary" type="button" hidden>
            Новый раунд
          </button>
        </div>
        <div class="controls__player" id="playerControls" hidden>
          <button id="btnHit" class="btn btn--primary" type="button">Hit</button>
          <button id="btnStand" class="btn btn--secondary" type="button">
            Stand
          </button>
        </div>
      </section>

      <section class="side">
        <h2 class="side__title">Игроки</h2>
        <ul id="playerList" class="player-list"></ul>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/room.js"></script>
  </body>
</html>
