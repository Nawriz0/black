<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blackjack 21 — онлайн-комнаты</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="page page--home">
    <div class="bg-ambient" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

    <main class="shell shell--home">
      <header class="hero">
        <div class="hero__badge" aria-hidden="true">
          <span class="hero__suit">♠</span>
          <span class="hero__suit hero__suit--red">♥</span>
        </div>
        <p class="eyebrow">Live • WebSocket</p>
        <h1 class="hero__title">Blackjack <span class="hero__accent">21</span></h1>
        <p class="hero__lead">
          Создайте комнату, отправьте код друзьям и сыграйте вместе против дилера в реальном времени.
        </p>
      </header>

      <section class="panel glass">
        <label class="field">
          <span class="field__label">Ваше имя</span>
          <input
            id="playerName"
            class="input"
            type="text"
            maxlength="24"
            autocomplete="nickname"
            placeholder="Например, Алекс"
          />
        </label>

        <div class="actions actions--stack">
          <button id="btnCreate" class="btn btn--primary btn--lg" type="button">
            Создать комнату
          </button>
        </div>

        <div class="divider"><span>или</span></div>

        <label class="field">
          <span class="field__label">Код комнаты</span>
          <input
            id="roomCode"
            class="input input--mono"
            type="text"
            maxlength="8"
            placeholder="Например, K7P2M3"
          />
        </label>

        <div class="actions actions--stack">
          <button id="btnJoin" class="btn btn--gold btn--lg" type="button">
            Войти в комнату
          </button>
        </div>

        <p id="homeError" class="msg msg--error" role="status" hidden></p>
      </section>

      <footer class="foot">
        <span>Колода и правила на сервере — клиент только показывает стол.</span>
      </footer>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
